<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="chip" x1="8" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F87171"/>
      <stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Chip body -->
  <circle cx="24" cy="24" r="21" fill="url(#chip)" stroke="#991B1B" stroke-width="1.5"/>
  <!-- Edge spots (white dashes around the rim) -->
  <g fill="#ffffff">
    <rect x="21" y="2.5"  width="6" height="7" rx="2"/>
    <rect x="21" y="38.5" width="6" height="7" rx="2"/>
    <rect x="2.5"  y="21" width="7" height="6" rx="2"/>
    <rect x="38.5" y="21" width="7" height="6" rx="2"/>
    <rect x="7" y="7"   width="6.5" height="6.5" rx="2" transform="rotate(45 10.25 10.25)"/>
    <rect x="34.5" y="34.5" width="6.5" height="6.5" rx="2" transform="rotate(45 37.75 37.75)"/>
  </g>
  <!-- Inner dashed ring -->
  <circle cx="24" cy="24" r="14.5" fill="none" stroke="#ffffff" stroke-width="2"
          stroke-dasharray="4 3.5" opacity="0.9"/>
  <!-- Center disc -->
  <circle cx="24" cy="24" r="9.5" fill="#ffffff"/>
  <circle cx="24" cy="24" r="9.5" fill="none" stroke="#991B1B" stroke-width="1.2"/>
  <!-- Center mark -->
  <text x="24" y="28.5" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="12" font-weight="700" fill="#DC2626">¥</text>
</svg>
